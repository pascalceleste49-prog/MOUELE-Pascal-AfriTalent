        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <img src="images/AfriTalent No background.png" alt="Logo AfriTalent">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav ms-auto">

                            </button>
                        </li>

        </nav>
    </header>
    <h1>CONTACTS</h1>
    <div id="top"></div>
    <section class="fade_in">
            <div id="container_contacts">
            <form action="" method="">
                <div>
                    <label for="name">Nom</label>
                    <input type="text" class="space" id="nom">
                    <small class="error"></small>
                </div>
                <div>
                    <label for="firstname">Prénom</label>
                    <input type="text" class="space" id="prenom">
                    <small class="error"></small>
                </div>
                <div>
                    <label for="mail">Email</label>
                    <input type="email" class="space" id="mail">
                    <small class="error"></small>
                </div>
                <div>
                    <label for="sujet">Sujet</label>
                    <select name="sujet" id="sujet" class="space">
                        <option value="default">Choisir une option</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Entreprise">Entreprise</option>
                    </select>
                    <small class="error"></small>
                </div>
                <div> 
                    <label for="message">Message</label>
                    <input type="text" id="text">
                    <small class="error"></small>
                </div>
                <div id="form_btn">
                    <input type="submit" value="Envoyer" id="envoyer">
                    <button type="reset" id="anuuler">Annuler</button>
                    <small class="success"></small>
                </div>
            </form>
        </div>

    </section>
